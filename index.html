<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zyphor OS</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0d0f14;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 700px;
            padding: 20px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            color: #4fd1c5;
        }

        p {
            font-size: 1.2rem;
            color: #cbd5e0;
            line-height: 1.6;
        }

        .tagline {
            margin-top: 10px;
            font-style: italic;
            color: #a0aec0;
        }

        .btn {
            margin-top: 20px;
            display: inline-block;
            padding: 10px 20px;
            border: 1px solid #4fd1c5;
            color: #4fd1c5;
            text-decoration: none;
            border-radius: 6px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #4fd1c5;
            color: #0d0f14;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Zyphor OS</h1>
        <p>
            A lightweight, educational, and developer-focused operating system designed for learning,
            exploration, and system understanding.
        </p>

        <div class="tagline">
            Built for learners. Powered by curiosity. Driven by open systems.
        </div>

        <a class="btn" href="https://github.com/zyphor-os">Explore Project</a>
    </div>
</body>
</html>
